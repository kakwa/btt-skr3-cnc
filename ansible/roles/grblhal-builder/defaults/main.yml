---
# grblHAL build tools configuration

# Build tools user
grblhal_build_user: root
grblhal_build_group: root

# Installation paths
grblhal_source_dir: "/opt/grblhal"
grblhal_build_dir: "{{ grblhal_source_dir }}/build"

# Source repository on the local machine (relative to playbook)
grblhal_local_source: "{{ playbook_dir }}/../grblhal"

# Target board configuration
grblhal_board: "BTT_SKR_3_EZ"
grblhal_mcu: "STM32H7xx"
grblhal_platformio_env: "btt_skr_30_h723_tmc5160_bl128"

# Machine options passed via PLATFORMIO_BUILD_FLAGS (no my_machine.h).
# Keep in sync with grblhal_config.h at the repo root.
grblhal_machine_build_flags: >-
  -D GRBL_BUILD_INFO=\"BTT-SKR3-TMC5160-SPI-XY-GANGED\"
  -D TRINAMIC_SPI_ENABLE=1
  -D X_GANGED=1
  -D X_AUTO_SQUARE=1
  -D Y_GANGED=1
  -D Y_AUTO_SQUARE=1
  -D DEFAULT_X_CURRENT=1500.0f
  -D DEFAULT_Y_CURRENT=1500.0f
  -D DEFAULT_Z_CURRENT=1000.0f
  -D DEFAULT_A_CURRENT=1500.0f
  -D DEFAULT_B_CURRENT=1500.0f
  -D TRINAMIC_DEFAULT_MICROSTEPS=32
  -D ESTOP_ENABLE=0
  -D CONTROL_ENABLE=0

# ARM toolchain version (use 'present' for distro version)
grblhal_arm_toolchain_state: present

# Enable/disable components
grblhal_install_build_tools: true
grblhal_install_flash_tools: true
grblhal_deploy_sources: true
